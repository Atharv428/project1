<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project 1 - Quote Generator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #000000, #1a1a1a, #2b0033);
        color: white;
    }

    #First {
        background: rgba(255, 255, 255, 0.08);
        padding: 40px;
        border-radius: 15px;
        text-align: center;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        width: 350px;
    }

    h1 {
        margin-bottom: 25px;
        font-size: 24px;
        color: #d78cff;
    }

    button {
        background: linear-gradient(45deg, #9d00ff, #ff00cc);
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        transform: scale(1.08);
        box-shadow: 0 5px 15px rgba(157, 0, 255, 0.6);
    }

    button:active {
        transform: scale(0.98);
    }
</style>

</head>

<body>
  <div id="First">
    <h1>✨ Honesty is the Best Policy ✨</h1>
    <button>💬 Random Quote Generator</button>
  </div>

<script src="./first.js"></script>
</body>
</html>
