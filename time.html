<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Display ⏰</title>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #3e2723, #5d4037);
    }

    #container {
        background: linear-gradient(145deg, #4e342e, #6d4c41);
        padding: 50px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 
            0 15px 35px rgba(0, 0, 0, 0.6),
            inset 0 0 15px rgba(255, 255, 255, 0.1);
        width: 380px;
        border: 2px solid #d7ccc8;
    }

    h1 {
        margin-bottom: 30px;
        font-size: 26px;
        letter-spacing: 2px;
        color: #f5f5f5;
        text-transform: uppercase;
    }

    #time {
        font-size: 55px;
        font-weight: bold;
        color: #ffffff;
        text-shadow: 
            0 0 10px rgba(255, 255, 255, 0.6),
            0 0 20px rgba(255, 255, 255, 0.3);
        letter-spacing: 3px;
    }

    #container:hover {
        transform: scale(1.05);
        transition: 0.3s ease-in-out;
    }
</style>
</head>
<body style="background-color: black; color: white; display: flex; justify-content: center; align-items: center;" >
    <div id="time" style="font-size: 48px; font-weight: bold;"></div>
  </body> 
  <script src="./digital.js"></script> 
</html>
